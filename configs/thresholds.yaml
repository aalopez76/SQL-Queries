# thresholds.yaml — quality thresholds for sql-analytics-portfolio
# Consumed by the data_validation and query_review skills.

# --- Data validation (skill: data_validation) ---
data_quality:
  max_null_pct: 0.20          # max % of nulls tolerated per column before marking 🔴
  low_cardinality_max: 20     # distinct count below which a column is "categorical"
  iqr_multiplier: 1.5         # factor for outlier detection by the quartile rule
  forbid_negative_in:         # columns where a negative value is always an error
    - creditLimit
    - quantityOrdered
    - priceEach
    - amount
    - buyPrice
    - MSRP
  expected_tables:            # tables that must exist (classicmodels schema)
    - customers
    - employees
    - offices
    - orders
    - orderdetails
    - payments
    - products
    - productlines

# --- Query review (skill: query_review) ---
query_quality:
  max_lines: 150              # reasonable maximum length of a .sql script
  max_subquery_depth: 3       # subquery nesting before requiring CTEs
  require_header_comment: true        # every .sql must start with a purpose comment
  require_uppercase_keywords: true    # SELECT/FROM/WHERE in uppercase
  forbid_select_star_in_aggregations: true
  blocking:                   # breaking these => "needs review" verdict
    - executes_without_error  # the query must run in SQLite without error
    - sqlite_compatible       # no other-engine syntax
  sqlfluff:
    dialect: sqlite
    enabled_if_installed: true
