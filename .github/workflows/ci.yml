name: CI

# Lightweight CI for the SQL portfolio. There is no build or application tests: what
# is verified is (1) SQL style/dialect, (2) DB integrity, and
# (3) that the predictive query results have not drifted.
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install sqlfluff
        run: pip install "sqlfluff==4.2.1"

      - name: Install sqlite3
        run: sudo apt-get update && sudo apt-get install -y sqlite3

      - name: Versions
        run: |
          sqlite3 --version
          sqlfluff --version

      # 1) SQLite style and dialect (must be at 0 violations).
      - name: Lint SQL (sqlfluff)
        run: sqlfluff lint queries --dialect sqlite

      # 2) Referential integrity and DB counts.
      - name: Validate database
        shell: pwsh
        run: pwsh scripts/validate_db.ps1

      # 3) Drift detection on the predictive queries.
      - name: Check predictive snapshots
        shell: pwsh
        run: pwsh scripts/snapshot_predictive.ps1
